name: "Build, Scan & Push App"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend-app/**'
  workflow_dispatch:

jobs:
  build-and-scan:
    name: "Build & Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Local Image for Scanning
        run: |
          docker build -t tasky-backend:${{ github.sha }} ./backend-app

      - name: Run Trivy Vulnerability Scanner
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --severity CRITICAL,HIGH tasky-backend:${{ github.sha }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: ./backend-app
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/wiz-tasky-repo:latest
            ${{ steps.login-ecr.outputs.registry }}/wiz-tasky-repo:${{ github.sha }}