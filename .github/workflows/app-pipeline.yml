name: "Build, Scan & Push App"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # This lets you trigger it manually for testing

jobs:
  build-and-scan:
    name: "Build & Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: |
          # Build the image inside the correct folder
          docker build -t tasky-backend:${{ github.sha }} ./backend-app

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'tasky-backend:${{ github.sha }}'
          format: 'table'
          # We use exit-code 0 so the pipeline finishes even if it finds risks
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
          # This tells Trivy to scan the local image we just built
          vuln-type: 'os,library'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: wiz-tasky-repo 
        run: |
          docker tag tasky-backend:${{ github.sha }} $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest