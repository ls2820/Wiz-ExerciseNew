name: "IaC Security Scan & Deploy"

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  terraform-security-scan:
    name: "Scan & Plan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: true 

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -input=false
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
          # Simple String Variables
          TF_VAR_region: "us-east-1"
          TF_VAR_vpc_cidr: "10.0.0.0/16"
          TF_VAR_eks_cluster_name: "wiz-tasky-cluster"
          TF_VAR_cluster_version: "1.31"
          TF_VAR_my_name: "ls2820-wiz-exercise"
          # List Variables (JSON format in single quotes)
          TF_VAR_public_subnet_cidr: '["10.0.1.0/24", "10.0.2.0/24"]'
          TF_VAR_private_subnet_cidr: '["10.0.10.0/24", "10.0.11.0/24"]'
          TF_VAR_availability_zones: '["us-east-1a", "us-east-1b"]'
          # Sensitive Variable (Pulled from GitHub Secrets)
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          # Complex Map/Object Variable
          TF_VAR_node_groups: |
            {
              "main": {
                "instance_types": ["t3.medium"],
                "capacity_type": "ON_DEMAND",
                "scaling_config": {
                  "desired_size": 2,
                  "max_size": 3,
                  "min_size": 1
                }
              }
            }